# Render Blueprint — one-click deploy of Travel AI (TAI).
# https://render.com/docs/blueprint-spec
#
# Deploys the unified Docker image (FastAPI serving the built React SPA) as a
# free web service. Runs with the real Gemini provider; GEMINI_API_KEY is a
# dashboard-only secret (sync: false) so it is never committed here.
#
# To deploy: push this file, then on Render choose "New +" → "Blueprint",
# pick this repo, and approve. Render builds the Dockerfile and binds $PORT.
services:
  - type: web
    name: travel-ai-tai
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Real Gemini in production (model defaults to gemini-2.0-flash in code).
      # The Gemini SDK ships in the prod image (see requirements.txt), so this
      # provider loads at startup. NOTE: the free-tier Gemini quota is small —
      # if it is exhausted the API returns 503 (Retry-After); for reliable live
      # use, enable pay-as-you-go billing on the key.
      - key: LLM_PROVIDER
        value: gemini
      # Secret — set in the Render dashboard, NEVER committed. `sync: false`
      # keeps the blueprint from managing (or clearing) the dashboard value.
      - key: GEMINI_API_KEY
        sync: false
      # In-memory cache (no Redis needed on the free tier).
      - key: CACHE_BACKEND
        value: memory
