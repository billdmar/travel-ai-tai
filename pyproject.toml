[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
addopts = "-q"
filterwarnings = [
    "error",
    # slowapi/limits emits a DeprecationWarning on Python 3.12+ via pkg_resources;
    # we run 3.11 but keep this tolerant so the suite stays warning-clean.
    "ignore::DeprecationWarning:pkg_resources",
    "ignore::DeprecationWarning:limits",
    # FastAPI 0.139 still references Starlette's deprecated
    # HTTP_422_UNPROCESSABLE_ENTITY constant internally (fastapi/routing.py),
    # which Starlette 1.x flags via StarletteDeprecationWarning (a UserWarning
    # subclass, NOT DeprecationWarning). It fires on any 422 response and is
    # upstream's to fix — ignore by message until FastAPI catches up.
    "ignore:.*HTTP_422_UNPROCESSABLE_ENTITY.*:UserWarning",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]
# B008 (Depends() in defaults) is the idiomatic FastAPI pattern; not enabled.

[tool.mypy]
python_version = "3.11"
# Optional third-party deps that ship no type stubs (cachetools, the langchain
# providers — the latter imported lazily and only when LLM_PROVIDER=langchain).
# Silencing missing-import noise keeps the scoped, blocking type-check signal
# focused on our own code rather than untyped upstream packages.
ignore_missing_imports = true

[tool.bandit]
exclude_dirs = ["tests", "migrations"]
